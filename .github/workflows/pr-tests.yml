name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-checks:
    name: Frontend and functions build checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run frontend lint
        run: node .github/scripts/fail-on-warning-output.mjs -- npm run lint

      - name: Run root build
        run: node .github/scripts/fail-on-warning-output.mjs -- npm run build

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Run functions build
        run: node .github/scripts/fail-on-warning-output.mjs -- npm --prefix functions run build

  frontend-tests:
    name: Frontend full test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run frontend test suite
        run: node .github/scripts/fail-on-warning-output.mjs -- npm run test:run

  functions-security-tests:
    name: Functions security tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Run functions security suites
        run: node .github/scripts/fail-on-warning-output.mjs -- npm --prefix functions run test -- authGuards dataconnectAuthContracts functionEntryGuardContracts --run
