name: Template drift check (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'functions/email-templates/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  drift-check:
    name: Check GOV Notify template sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Run drift check
        env:
          GOV_NOTIFY_API_KEY: ${{ secrets.GOV_NOTIFY_API_KEY }}
          CHECK_ENV: dev
          DRIFT_OUTPUT_FILE: /tmp/drift-summary.md
        run: npm --prefix functions run check:template-sync

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '/tmp/drift-summary.md';
            if (!fs.existsSync(summaryPath)) {
              console.log('No summary file — API key probably not set, skipping comment');
              return;
            }
            const body = fs.readFileSync(summaryPath, 'utf8');
            const marker = '<!-- template-drift-check -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
