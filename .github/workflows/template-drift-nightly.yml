name: Template drift check (nightly)

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to check
        required: false
        default: production
        type: choice
        options: [dev, beta, production]

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    name: Check GOV Notify template sync (${{ inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Run drift check
        env:
          GOV_NOTIFY_API_KEY: ${{ secrets.GOV_NOTIFY_API_KEY }}
          CHECK_ENV: ${{ inputs.environment || 'production' }}
          DRIFT_OUTPUT_FILE: /tmp/drift-summary.md
        run: npm --prefix functions run check:template-sync

      - name: Open issue on drift
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '/tmp/drift-summary.md';
            if (!fs.existsSync(summaryPath)) {
              console.log('No summary file — skipping');
              return;
            }
            const body = fs.readFileSync(summaryPath, 'utf8');
            if (body.includes('✅')) {
              console.log('All templates in sync — no issue needed');
              return;
            }

            // Check for an existing open drift issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'template-drift',
            });

            const title = `⚠️ GOV Notify template drift detected (${{ inputs.environment || 'production' }})`;

            if (issues.length > 0) {
              // Update the existing open issue with latest findings
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body + '\n\n_Updated by nightly drift check_',
              });
              console.log(`Updated existing drift issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['template-drift'],
              });
              console.log('Created new drift issue');
            }
