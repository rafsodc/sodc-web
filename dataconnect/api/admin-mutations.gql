# Load bookings for a booker and event (Firebase Functions / admin SDK only).
query GetBookingsForBookerAndEvent($bookerId: String!, $eventId: UUID!) @auth(level: NO_ACCESS) {
  user(id: $bookerId) {
    id
    bookings: bookings_on_booker(where: { eventId: { eq: $eventId } }) {
      id
      status
      revisionGroupId
      revisionNumber
      supersededAt
      supersedesBooking {
        id
      }
      clientSubmissionKey
      bookerDietaryNote
      sitNextToUserIds
      accommodationRequested
      accommodationNote
      createdAt
      updatedAt
      lines: bookingLines_on_booking(orderBy: { sortOrder: ASC }) {
        id
        sortOrder
        guestDisplayName
        dietaryNote
        guestUser {
          id
        }
        ticketType {
          id
          audience
          price
          title
        }
      }
      guestTicketRequests: guestTicketRequests_on_booking(orderBy: { createdAt: DESC }) {
        id
        status
        requestedGuestCount
        guestTicketType {
          id
          title
          price
        }
      }
    }
  }
}

query GetTicketOrdersForBookerAndEvent($userId: String!, $eventId: UUID!) @auth(level: NO_ACCESS) {
