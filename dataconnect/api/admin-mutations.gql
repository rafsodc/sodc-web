# Guest ticket request callables — load booking context for submit validation.
query GetBookingForGuestTicketCallable($bookingId: UUID!) @auth(level: NO_ACCESS) {
  booking(id: $bookingId) {
    id
    booker {
      id
      firstName
      lastName
      email
    }
    event {
      id
      title
      section {
        id
        name
      }
    }
    supersedesBooking {
      guestTicketRequests: guestTicketRequests_on_booking(orderBy: { createdAt: ASC }) {
        status
        requestedGuestCount
        guestDisplayName
        guestTicketType {
          id
        }
        reviewedBy {
          id
        }
        reviewedAt
        moderatorNote
      }
    }
    guestTicketRequests: guestTicketRequests_on_booking(orderBy: { createdAt: ASC }) {
      status
      requestedGuestCount
      guestDisplayName
      guestTicketType {
        id
      }
    }
  }
}

