# submitEventBooking callable — admin SDK has no user JWT; avoid @auth(expr) on user queries.
query GetEventByIdForCallable($id: UUID!) @auth(level: NO_ACCESS) {
  event(id: $id) {
    id
    section {
      id
    }
    title
    location
    guestOfHonour
    startDateTime
    endDateTime
    bookingStartDateTime
    bookingEndDateTime
    maxGuestsWithoutModeratorApproval
    ticketTypes: ticketTypes_on_event(orderBy: { sortOrder: ASC }) {
      id
      title
      description
      audience
      price
      sortOrder
      userGroup {
        id
        name
        membershipStatuses
      }
    }
  }
}

query GetSectionByIdForCallable($id: UUID!) @auth(level: NO_ACCESS) {
  section(id: $id) {
    id
    name
    type
    description
    isOpenForRegistration
    allowedUserGroups
    purposeLinks: sectionUserGroupPurposeLinks_on_section {
      purposes
      userGroup {
        id
        name
        description
        subscribable
        membershipStatuses
      }
    }
  }
}

# Load bookings for a booker and event (Firebase Functions / admin SDK only).
query GetBookingsForBookerAndEvent($bookerId: String!, $eventId: UUID!) @auth(level: NO_ACCESS) {
  user(id: $bookerId) {
    id
    bookings: bookings_on_booker(where: { eventId: { eq: $eventId } }) {
      id
      status
      revisionGroupId
      revisionNumber
      supersededAt
      supersedesBooking {
        id
      }
      clientSubmissionKey
      bookerDietaryNote
      sitNextToUserIds
      accommodationRequested
      accommodationNote
      createdAt
      updatedAt
      lines: bookingLines_on_booking(orderBy: { sortOrder: ASC }) {
        id
        sortOrder
        guestDisplayName
        dietaryNote
        guestUser {
          id
        }
        ticketType {
          id
          audience
          price
        }
      }
      guestTicketRequests: guestTicketRequests_on_booking(orderBy: { createdAt: DESC }) {
        id
        status
        requestedGuestCount
      }
    }
  }
}

# Firebase Functions: create draft with explicit booker and idempotency key (NO_ACCESS; not client-callable).
# Backward-compatible form: revision fields omitted so schema defaults apply.
mutation CreateBookingDraftForUser(
  $eventId: UUID!
  $bookerId: String!
  $clientSubmissionKey: String!
) @auth(level: NO_ACCESS) {
  booking_insert(
    data: {
      eventId: $eventId
      bookerId: $bookerId
      clientSubmissionKey: $clientSubmissionKey
      status: DRAFT
      createdBy: "system"
      updatedBy: "system"
    }
  )
}

# Firebase Functions: explicit revision insert for mutable booking updates.
mutation CreateBookingDraftRevisionForUser(
  $eventId: UUID!
  $bookerId: String!
  $clientSubmissionKey: String!
  $revisionGroupId: UUID!
  $revisionNumber: Int!
  $supersedesBookingId: UUID!
) @auth(level: NO_ACCESS) {
  booking_insert(
    data: {
      eventId: $eventId
      bookerId: $bookerId
      clientSubmissionKey: $clientSubmissionKey
      revisionGroupId: $revisionGroupId
      revisionNumber: $revisionNumber
      supersedesBookingId: $supersedesBookingId
      status: DRAFT
      createdBy: "system"
      updatedBy: "system"
    }
  )
}

