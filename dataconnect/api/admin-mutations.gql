# Guest ticket request emails — request + booker/event context after create or review.
# Scheduled cleanup: stale DRAFT bookings past TTL (issue #235).
query ListStaleDraftBookingsForScheduler(
  $updatedBefore: Timestamp!
  $limit: Int!
) @auth(level: NO_ACCESS) {
  bookings(
    where: {
      status: { eq: DRAFT }
      updatedAt: { lt: $updatedBefore }
    }
    orderBy: { updatedAt: ASC }
    limit: $limit
  ) {
    id
    status
    updatedAt
  }
}

# Scheduled cleanup: unpaid PENDING ticket orders past TTL (issue #235).
query ListStalePendingTicketOrdersForScheduler(
  $createdBefore: Timestamp!
  $limit: Int!
) @auth(level: NO_ACCESS) {
  ticketOrders(
    where: {
      status: { eq: PENDING }
      createdAt: { lt: $createdBefore }
    }
    orderBy: { createdAt: ASC }
    limit: $limit
  ) {
    id
    status
    createdAt
  }
}

query GetGuestTicketRequestForNotification($id: UUID!) @auth(level: NO_ACCESS) {
  guestTicketRequest(id: $id) {
    id
    status
    requestedGuestCount
    guestDisplayName
    dietaryNote
    moderatorNote
    guestTicketType {
      id
      title
    }
    booking {
      id
      booker {
        id
        firstName
        lastName
        email
      }
      event {
        id
        title
        section {
          id
          name
        }
      }
    }
  }
}



# Get all users who have opted out of announcements for a section (used by sendSectionAnnouncement)
query GetSectionAnnouncementOptOuts($sectionId: UUID!) @auth(level: NO_ACCESS) {
  sectionAnnouncementOptOuts(where: { sectionId: { eq: $sectionId } }) {
    user {
      id
    }
  }
}

# ── Announcement audit trail ─────────────────────────────────────────────────

mutation CreateAnnouncementSend(
  $id: UUID!
  $sectionId: UUID!
  $templateUuid: String!
  $templateName: String
  $sentBy: String!
  $recipientCount: Int!
  $skippedCount: Int!
  $failureCount: Int!
) @auth(level: NO_ACCESS) {
  announcementSend_insert(data: {
    id: $id
    sectionId: $sectionId
    templateUuid: $templateUuid
    templateName: $templateName
    sentBy: $sentBy
    recipientCount: $recipientCount
    skippedCount: $skippedCount
    failureCount: $failureCount
  })
}

mutation CreateAnnouncementRecipient(
  $announcementSendId: UUID!
  $userId: String!
  $email: String!
  $firstName: String!
  $lastName: String!
  $status: String!
  $skippedReason: String
  $sentAt: Timestamp
  $failureReason: String
) @auth(level: NO_ACCESS) {
  announcementRecipient_insert(data: {
    announcementSendId: $announcementSendId
    userId: $userId
    email: $email
    firstName: $firstName
    lastName: $lastName
    status: $status
    skippedReason: $skippedReason
    sentAt: $sentAt
    failureReason: $failureReason
  })
}

query GetAnnouncementRecipientCount($sendId: UUID!) @auth(level: NO_ACCESS) {
  announcementRecipients(where: { announcementSendId: { eq: $sendId } }) {
    id
  }
}

query GetAnnouncementSendHistory($sectionId: UUID!) @auth(level: NO_ACCESS) {
  announcementSends(
    where: { sectionId: { eq: $sectionId } }
    orderBy: { sentAt: DESC }
    limit: 50
  ) {
    id
    templateUuid
    templateName
    sentBy
    sentAt
    recipientCount
    skippedCount
    failureCount
  }
}

query GetAnnouncementSendRecipients($sendId: UUID!) @auth(level: NO_ACCESS) {
  announcementRecipients(
    where: { announcementSendId: { eq: $sendId } }
    orderBy: { lastName: ASC }
  ) {
    id
    userId
    email
    firstName
    lastName
    status
    skippedReason
    sentAt
    failureReason
  }
}

# Used to verify a send actually belongs to the sectionId a caller was authorized against,
# before returning its (PII-bearing) recipients — see getAnnouncementSendRecipients.
query GetAnnouncementSendById($id: UUID!) @auth(level: NO_ACCESS) {
  announcementSend(id: $id) {
    id
    sectionId
  }
}

# ── Email bounce tracking ────────────────────────────────────────────────────

query GetUserByEmail($email: String!) @auth(level: NO_ACCESS) {
  users(where: { email: { eq: $email } }, limit: 1) {
    id
    membershipStatus
    emailBounceCount
  }
}

mutation UpdateEmailBounceStats(
  $userId: String!
  $emailBounceCount: Int!
  $emailLastBounceAt: Timestamp
) @auth(level: NO_ACCESS) {
  user_update(
    id: $userId
    data: {
      emailBounceCount: $emailBounceCount
      emailLastBounceAt: $emailLastBounceAt
      updatedAt_expr: "request.time"
      updatedBy: "system"
    }
  )
}

# ── Unsubscribe ───────────────────────────────────────────────────────────────

# Opt a specific user out of a section's announcements by userId (used by unsubscribeAnnouncement CF)
mutation AdminOptOutSectionAnnouncement($userId: String!, $sectionId: UUID!) @auth(level: NO_ACCESS) {
  sectionAnnouncementOptOut_upsert(data: {
    userId: $userId,
    sectionId: $sectionId
  })
}

# Remove a specific user's opt-out for a section's announcements (re-subscribe, used by unsubscribeAnnouncement CF)
mutation AdminOptInSectionAnnouncement($userId: String!, $sectionId: UUID!) @auth(level: NO_ACCESS) {
  sectionAnnouncementOptOut_delete(key: { userId: $userId, sectionId: $sectionId })
}

# ── Rate limiting (functions/src/rateLimiter.ts) ─────────────────────────────

query GetCallableInvocation($userId: String!, $functionName: String!) @auth(level: NO_ACCESS) {
  callableInvocation(key: { userId: $userId, functionName: $functionName }) {
    windowStart
    count
  }
}

mutation UpsertCallableInvocation(
  $userId: String!
  $functionName: String!
  $windowStart: Timestamp!
  $count: Int!
) @auth(level: NO_ACCESS) {
  callableInvocation_upsert(
    data: { userId: $userId, functionName: $functionName, windowStart: $windowStart, count: $count }
  )
}
