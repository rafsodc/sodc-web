query GetPaymentReconciliationExceptionByOrderAndType(
  $ticketOrderId: UUID!
  $exceptionType: PaymentReconciliationExceptionType!
) @auth(level: NO_ACCESS) {
  paymentReconciliationExceptions(
    where: {
      ticketOrderId: { eq: $ticketOrderId }
      exceptionType: { eq: $exceptionType }
    }
    limit: 1
  ) {
    id
  }
}

