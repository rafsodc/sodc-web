# SODC Admin SDK Mutations
#
# These mutations are SDK-only and use @auth(level: NO_ACCESS).
# They can only be called from Firebase Functions or CLI scripts using the admin SDK.
# They are NOT accessible from the frontend/client SDK.
#
# Auth Expression: @auth(level: NO_ACCESS)
# See AUTH_EXPRESSIONS.md for complete documentation.

# Update user membership status (SDK only)
# Used by Firebase Functions to update membership status with server-side validation
mutation UpdateUserMembershipStatus($userId: String!, $membershipStatus: MembershipStatus!) @auth(level: NO_ACCESS) {
  user_update(
    id: $userId
    data: { 
      membershipStatus: $membershipStatus
      updatedAt_expr: "request.time"
      updatedBy: "system"
    }
  )
}

# Delete a user (SDK only)
# Used by Firebase Functions/CLI for dev reset operations
mutation DeleteUser($userId: String!) @auth(level: NO_ACCESS) {
  user_delete(id: $userId)
}

# Create a user profile (SDK only)
# Used by Firebase Functions/CLI to create user profiles
# This mutation works with service account credentials (no user auth token required)
# Note: All fields with default expressions referencing auth.uid must be set explicitly
# since auth.uid is not available in NO_ACCESS context
mutation CreateUser(
  $userId: String!
  $firstName: String!
  $lastName: String!
  $email: String!
  $serviceNumber: String!
  $membershipStatus: MembershipStatus!
  $isRegular: Boolean
  $isReserve: Boolean
  $isCivilServant: Boolean
  $isIndustry: Boolean
  $now: Timestamp!
) @auth(level: NO_ACCESS) {
  user_upsert(
    data: {
      id: $userId
      firstName: $firstName
      lastName: $lastName
      email: $email
      serviceNumber: $serviceNumber
      requestedMembershipStatus: $membershipStatus
      membershipStatus: $membershipStatus
      isRegular: $isRegular
      isReserve: $isReserve
      isCivilServant: $isCivilServant
      isIndustry: $isIndustry
      createdBy: "system"
      updatedBy: "system"
      createdAt: $now
      updatedAt: $now
    }
  )
}

# Create a user group (SDK only)
# Used by Firebase Functions to automatically create status-based user groups
mutation CreateUserGroupAdmin(
  $name: String!
  $description: String
  $now: Timestamp!
) @auth(level: NO_ACCESS) {
  userGroup_insert(
    data: {
      name: $name
      description: $description
      createdBy: "system"
      updatedBy: "system"
      createdAt: $now
      updatedAt: $now
    }
  )
}

# Add a user to a user group (SDK only)
# Used by Firebase Functions to automatically assign users to user groups
mutation AddUserToUserGroupAdmin(
  $userId: String!
  $userGroupId: UUID!
  $now: Timestamp!
) @auth(level: NO_ACCESS) {
  userUserGroup_upsert(
    data: {
      userId: $userId
      userGroupId: $userGroupId
      createdBy: "system"
      updatedBy: "system"
      createdAt: $now
      updatedAt: $now
    }
  )
}

# Remove a user from a user group (SDK only)
# Used by Firebase Functions to automatically remove users from user groups
mutation RemoveUserFromUserGroupAdmin(
  $userId: String!
  $userGroupId: UUID!
) @auth(level: NO_ACCESS) {
  userUserGroup_delete(
    key: {
      userId: $userId
      userGroupId: $userGroupId
    }
  )
}

# Get user group by name (SDK only)
# Used by Firebase Functions to find existing user groups
query GetUserGroupByName($name: String!) @auth(level: NO_ACCESS) {
  userGroups(where: { name: { eq: $name } }) {
    id
    name
    description
  }
}

# Get all user groups for a user (SDK only)
# Used by Firebase Functions to get user's current user groups
query GetUserUserGroupsForAdmin($userId: String!) @auth(level: NO_ACCESS) {
  user(id: $userId) {
    id
    userGroups: userUserGroups_on_user {
      userGroup {
        id
        name
        description
      }
    }
  }
}

query GetUserForCheckout($userId: String!) @auth(level: NO_ACCESS) {
  user(id: $userId) {
    id
    email
    firstName
    lastName
    membershipStatus
    stripeCustomerId
