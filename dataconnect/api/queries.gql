# SODC User Queries
#
# Auth Expression Constants:
# - User access: "auth.token.enabled == true"
# - Admin access: "auth.token.admin == true && auth.token.enabled == true"
# - System access: @auth(level: NO_ACCESS)
# See AUTH_EXPRESSIONS.md for complete documentation and usage.
#
# @auth() directives control who can call each operation.

# Get the current authenticated user's profile
# Requires enabled claim (admins must also be enabled)
query GetCurrentUser @auth(expr: "auth.token.enabled == true") {
  user(key: { id_expr: "auth.uid" }) {
    id
    firstName
    lastName
    email
    serviceNumber
    membershipStatus
    requestedMembershipStatus
    isRegular
    isReserve
    isCivilServant
    isIndustry
    createdAt
    updatedAt
  }
}

# Get a user by ID (admin only - admins must also be enabled)
query GetUserById($id: String!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  user(id: $id) {
    id
    firstName
    lastName
    email
    serviceNumber
    membershipStatus
    requestedMembershipStatus
    isRegular
    isReserve
    isCivilServant
    isIndustry
    createdAt
    updatedAt
    createdBy
    updatedBy
  }
}

# List all users (admin only - admins must also be enabled)
query ListUsers @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  users {
    id
    firstName
    lastName
    email
    serviceNumber
    membershipStatus
    requestedMembershipStatus
    isRegular
    isReserve
    isCivilServant
    isIndustry
    createdAt
    updatedAt
    createdBy
    updatedBy
  }
}

# SODC Section and Access Group Queries

# Get all sections (admin only - admins must also be enabled)
query ListSections @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  sections {
    id
    name
    type
    description
    createdAt
    updatedAt
    createdBy
    updatedBy
  }
}

# Get sections accessible to the current user (ACCESS or MODERATOR purpose on a group the user matches)
# Requires enabled claim (admins must also be enabled)
query GetSectionsForUser @auth(expr: "auth.token.enabled == true") {
  user(key: { id_expr: "auth.uid" }) {
    id
    membershipStatus
    # Get user groups this user belongs to
    userGroups: userUserGroups_on_user {
      userGroup {
        id
        name
        membershipStatuses
        purposeLinks: sectionUserGroupPurposeLinks_on_userGroup {
          purpose
          section {
            id
            name
            type
            description
          }
        }
      }
    }
  }
  # Include all groups so users also inherit access from membershipStatuses-based groups
  allUserGroups: userGroups {
    id
    name
    membershipStatuses
    purposeLinks: sectionUserGroupPurposeLinks_on_userGroup {
      purpose
      section {
        id
        name
        type
        description
      }
    }
  }
}

# Get all user groups (admin only - admins must also be enabled)
query ListUserGroups @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userGroups {
    id
    name
    description
    membershipStatuses
    subscribable
    createdAt
    updatedAt
    createdBy
    updatedBy
  }
}

# Get user groups for the current user
# Requires enabled claim (admins must also be enabled)
query GetUserAccessGroups @auth(expr: "auth.token.enabled == true") {
  user(key: { id_expr: "auth.uid" }) {
    id
    userGroups: userUserGroups_on_user {
      userGroup {
        id
        name
        description
      }
    }
  }
}


# Check if current user's profile exists and get membership status (for users without enabled claim)
# Allows users to check if they've completed profile registration and see their status
query CheckUserProfileExists @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    firstName
    lastName
    membershipStatus
  }
}

# Get user status for the specified user
query GetUserMembershipStatus($id: String!) @auth(level: NO_ACCESS) {
  user(id: $id) {
    membershipStatus
  }
}

# Get user by ID with user groups (admin only)
query GetUserWithAccessGroups($id: String!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  user(id: $id) {
    id
    firstName
    lastName
    email
    membershipStatus
    userGroups: userUserGroups_on_user {
      userGroup {
        id
        name
        description
        membershipStatuses
      }
    }
  }
}

# Get user groups for a specific user (admin only)
query GetUserAccessGroupsById($userId: String!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  user(id: $userId) {
    id
    userGroups: userUserGroups_on_user {
      userGroup {
        id
        name
        description
      }
    }
  }
}

# Get events for a section (user must have access to section via GetSectionsForUser). Order by startDateTime.
query GetEventsForSection($sectionId: UUID!) @auth(expr: "auth.token.enabled == true") {
  section(id: $sectionId) {
    id
    events: events_on_section(orderBy: { startDateTime: ASC }) {
      id
      title
      location
      guestOfHonour
      startDateTime
      endDateTime
      bookingStartDateTime
      bookingEndDateTime
      maxGuestsWithoutModeratorApproval
    }
  }
}

# Get event by ID with ticket types (user must have access to event's section). Ticket types ordered by sortOrder.
query GetEventById($id: UUID!) @auth(expr: "auth.token.enabled == true") {
  event(id: $id) {
    id
    section {
      id
    }
    title
    location
    guestOfHonour
    startDateTime
    endDateTime
    bookingStartDateTime
    bookingEndDateTime
    maxGuestsWithoutModeratorApproval
    ticketTypes: ticketTypes_on_event(orderBy: { sortOrder: ASC }) {
      id
      title
      description
      audience
      price
      sortOrder
      userGroup {
        id
        name
        membershipStatuses
      }
    }
  }
}

# Get section by ID with user groups and registration info
query GetSectionById($id: UUID!) @auth(expr: "auth.token.enabled == true") {
  section(id: $id) {
    id
    name
    type
    description
    isOpenForRegistration
    allowedUserGroups
    purposeLinks: sectionUserGroupPurposeLinks_on_section {
      purpose
      userGroup {
        id
        name
        description
        subscribable
        membershipStatuses
      }
    }
  }
}

# Get user group by ID with users and sections (admin only)
query GetUserGroupById($id: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userGroup(id: $id) {
    id
    name
    description
    membershipStatuses
    subscribable
    createdAt
    updatedAt
    createdBy
    updatedBy
    users: userUserGroups_on_userGroup {
      user {
        id
        firstName
        lastName
        email
        membershipStatus
      }
    }
    purposeLinks: sectionUserGroupPurposeLinks_on_userGroup {
      purpose
      section {
        id
        name
        type
        description
      }
    }
  }
}

# Get all user groups with membership statuses (SDK only - for membership status change logic)
query GetAllUserGroupsWithStatuses @auth(level: NO_ACCESS) {
  userGroups {
    id
    name
    membershipStatuses
  }
}

# Section member rollup uses MEMBER-purpose links; if none, ACCESS-purpose links (same as legacy fallback).
# Includes both directly added users and users whose membership status matches the group's membershipStatuses
query GetSectionMembers($sectionId: UUID!) @auth(expr: "auth.token.enabled == true") {
  section(id: $sectionId) {
    id
    name
    type
    description
    purposeLinks: sectionUserGroupPurposeLinks_on_section {
      purpose
      userGroup {
        id
        name
        membershipStatuses
        users: userUserGroups_on_userGroup {
          user {
            id
            firstName
            lastName
            email
            membershipStatus
          }
        }
      }
    }
  }
}

# Bookings for an event (current user as booker). Used for member booking UI.
query GetMyBookingsForEvent($eventId: UUID!) @auth(expr: "auth.token.enabled == true") {
  user(key: { id_expr: "auth.uid" }) {
    id
    bookings: bookings_on_booker(where: { eventId: { eq: $eventId } }) {
      id
      status
      clientSubmissionKey
      bookerDietaryNote
      sitNextToUserIds
      accommodationRequested
      accommodationNote
      createdAt
      updatedAt
      lines: bookingLines_on_booking(orderBy: { sortOrder: ASC }) {
        id
        sortOrder
        guestDisplayName
        dietaryNote
        ticketType {
          id
          title
          audience
          price
        }
        guestUser {
          id
          firstName
          lastName
        }
      }
      guestTicketRequests: guestTicketRequests_on_booking {
        id
        status
        requestedGuestCount
        guestDisplayName
        dietaryNote
        guestTicketType {
          id
          title
          audience
          price
        }
        reviewedAt
        moderatorNote
      }
    }
  }
}

# Current user's ticket order by id (used for post-checkout status UI).
query GetMyTicketOrderById($id: UUID!) @auth(expr: "auth.token.enabled == true") {
  user(key: { id_expr: "auth.uid" }) {
    id
    ticketOrders: ticketOrders_on_user(where: { id: { eq: $id } }) {
      id
      status
      quantity
      totalAmountMinor
      currency
      updatedAt
      ticketType {
        id
        title
      }
      event {
        id
        title
      }
    }
  }
}

# Admin: list booking graph for cascade delete before removing an event.
query ListEventBookingsForAdmin($eventId: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  event(id: $eventId) {
    id
    bookings: bookings_on_event {
      id
      guestTicketRequests: guestTicketRequests_on_booking {
        id
      }
      lines: bookingLines_on_booking {
        id
      }
    }
  }
}

# Admin: list guest ticket requests for moderation queue on an event.
query ListGuestTicketRequestsForAdmin($eventId: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  event(id: $eventId) {
    id
    title
    bookings: bookings_on_event {
      id
      status
      booker {
        id
        firstName
        lastName
        email
      }
      guestTicketRequests: guestTicketRequests_on_booking(orderBy: { createdAt: DESC }) {
        id
        status
        requestedGuestCount
        guestDisplayName
        dietaryNote
        moderatorNote
        createdAt
        reviewedAt
        guestTicketType {
          id
          title
          audience
          price
        }
      }
    }
  }
}