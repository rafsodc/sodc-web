# Booking mutations (member flow and admin cascade deletes).
# CreateBookingDraft, AddBookingLine, UpdateBookingStatus, and CreateGuestTicketRequest
# are server-only: all client paths go through the submitEventBooking / submitGuestTicketRequest
# callables which enforce ownership and booking rules before writing.

mutation CreateBookingDraft($eventId: UUID!) @auth(level: NO_ACCESS) {
  booking_insert(
    data: {
      eventId: $eventId
      bookerId_expr: "auth.uid"
      status: DRAFT
    }
  )
}

mutation AddBookingLine(
  $bookingId: UUID!
  $ticketTypeId: UUID!
  $guestUserId: String
  $guestDisplayName: String
  $dietaryNote: String
  $sortOrder: Int!
) @auth(level: NO_ACCESS) {
  bookingLine_insert(
    data: {
      bookingId: $bookingId
      ticketTypeId: $ticketTypeId
      guestUserId: $guestUserId
      guestDisplayName: $guestDisplayName
      dietaryNote: $dietaryNote
      sortOrder: $sortOrder
    }
  )
}

mutation UpdateBookingStatus($id: UUID!, $status: BookingStatus!) @auth(level: NO_ACCESS) {
  booking_update(
    id: $id
    data: {
      status: $status
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}

mutation CreateGuestTicketRequest(
  $bookingId: UUID!
  $requestedGuestCount: Int!
  $guestTicketTypeId: UUID!
  $guestDisplayName: String!
  $dietaryNote: String
) @auth(level: NO_ACCESS) {
  guestTicketRequest_insert(
    data: {
      bookingId: $bookingId
      requestedGuestCount: $requestedGuestCount
      guestTicketTypeId: $guestTicketTypeId
      guestDisplayName: $guestDisplayName
      dietaryNote: $dietaryNote
      status: PENDING
    }
  )
}

mutation AdminDeleteGuestTicketRequest($id: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  guestTicketRequest_delete(id: $id)
}

mutation AdminReviewGuestTicketRequest(
  $id: UUID!
  $status: GuestTicketRequestStatus!
  $moderatorNote: String
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  guestTicketRequest_update(
    id: $id
    data: {
      status: $status
      moderatorNote: $moderatorNote
      reviewedAt_expr: "request.time"
      reviewedById_expr: "auth.uid"
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}

mutation AdminDeleteBookingLine($id: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  bookingLine_delete(id: $id)
}

mutation AdminDeleteBooking($id: UUID!) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  booking_delete(id: $id)
}

mutation ResolvePaymentReconciliationException(
  $id: UUID!
  $note: String
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  paymentReconciliationException_update(
    id: $id
    data: {
      status: RESOLVED
      note: $note
      ownerUserId_expr: "auth.uid"
      lastAttemptedAt_expr: "request.time"
      resolvedAt_expr: "request.time"
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}
