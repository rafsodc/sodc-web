# SODC Access Control Mutations
#
# Mutations related to sections, access groups, and access control.
# These mutations are accessible from the frontend/client SDK and require admin authentication.
#
# Auth Expression Constants:
# - Admin access: "auth.token.admin == true && auth.token.enabled == true"
# See AUTH_EXPRESSIONS.md for complete documentation and usage.

# Create a new section (admin only - admins must also be enabled)
mutation CreateSection(
  $name: String!
  $type: SectionType!
  $description: String
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  section_insert(
    data: {
      name: $name
      type: $type
      description: $description
    }
  )
}

# Create a new user group (admin only - admins must also be enabled)
mutation CreateUserGroup(
  $name: String!
  $description: String
  $membershipStatuses: [MembershipStatus!]
  $subscribable: Boolean
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userGroup_insert(
    data: {
      name: $name
      description: $description
      membershipStatuses: $membershipStatuses
      subscribable: $subscribable
    }
  )
}

# Add a user to a user group (admin only - admins must also be enabled)
mutation AddUserToUserGroup(
  $userId: String!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userUserGroup_upsert(
    data: {
      userId: $userId
      userGroupId: $userGroupId
    }
  )
}

# Remove a user from a user group (admin only - admins must also be enabled)
mutation RemoveUserFromUserGroup(
  $userId: String!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userUserGroup_delete(
    key: {
      userId: $userId
      userGroupId: $userGroupId
    }
  )
}

# Grant a user group ACCESS to a section (admin only)
mutation GrantAccessGroupToSection(
  $sectionId: UUID!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  sectionAccessGroup_upsert(
    data: {
      sectionId: $sectionId
      userGroupId: $userGroupId
    }
  )
}

# Revoke a user group's ACCESS to a section (admin only)
mutation RevokeAccessGroupFromSection(
  $sectionId: UUID!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  sectionAccessGroup_delete(
    key: {
      sectionId: $sectionId
      userGroupId: $userGroupId
    }
  )
}

# Grant a user group MEMBER to a section (admin only)
mutation GrantMemberGroupToSection(
  $sectionId: UUID!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  sectionMemberGroup_upsert(
    data: {
      sectionId: $sectionId
      userGroupId: $userGroupId
    }
  )
}

# Revoke a user group's MEMBER from a section (admin only)
mutation RevokeMemberGroupFromSection(
  $sectionId: UUID!
  $userGroupId: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  sectionMemberGroup_delete(
    key: {
      sectionId: $sectionId
      userGroupId: $userGroupId
    }
  )
}

# Update a user group (admin only - admins must also be enabled)
mutation UpdateUserGroup(
  $id: UUID!
  $name: String!
  $description: String
  $membershipStatuses: [MembershipStatus!]
  $subscribable: Boolean
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userGroup_update(
    id: $id
    data: {
      name: $name
      description: $description
      membershipStatuses: $membershipStatuses
      subscribable: $subscribable
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}

# Delete a user group (admin only - admins must also be enabled)
mutation DeleteUserGroup(
  $id: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  userGroup_delete(id: $id)
}

# Update a section (admin only - admins must also be enabled)
# Note: type field is not included as it should not be changed after creation
mutation UpdateSection(
  $id: UUID!
  $name: String!
  $description: String
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  section_update(
    id: $id
    data: {
      name: $name
      description: $description
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}

# Delete a section (admin only - admins must also be enabled)
mutation DeleteSection(
  $id: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  section_delete(id: $id)
}

# --- Event mutations (admin only) ---

mutation CreateEvent(
  $sectionId: UUID!
  $title: String!
  $location: String
  $guestOfHonour: String
  $startDateTime: Timestamp!
  $endDateTime: Timestamp!
  $bookingStartDateTime: Timestamp!
  $bookingEndDateTime: Timestamp!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  event_insert(
    data: {
      sectionId: $sectionId
      title: $title
      location: $location
      guestOfHonour: $guestOfHonour
      startDateTime: $startDateTime
      endDateTime: $endDateTime
      bookingStartDateTime: $bookingStartDateTime
      bookingEndDateTime: $bookingEndDateTime
    }
  )
}

mutation UpdateEvent(
  $id: UUID!
  $title: String!
  $location: String
  $guestOfHonour: String
  $startDateTime: Timestamp!
  $endDateTime: Timestamp!
  $bookingStartDateTime: Timestamp!
  $bookingEndDateTime: Timestamp!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  event_update(
    id: $id
    data: {
      title: $title
      location: $location
      guestOfHonour: $guestOfHonour
      startDateTime: $startDateTime
      endDateTime: $endDateTime
      bookingStartDateTime: $bookingStartDateTime
      bookingEndDateTime: $bookingEndDateTime
      updatedAt_expr: "request.time"
      updatedBy_expr: "auth.uid"
    }
  )
}

mutation DeleteEvent(
  $id: UUID!
) @auth(expr: "auth.token.admin == true && auth.token.enabled == true") {
  event_delete(id: $id)
}

