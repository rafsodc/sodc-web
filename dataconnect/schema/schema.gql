# SODC (Signal Officers' Dinner Club) Data Connect Schema

# Section type enum
enum SectionType {
  MEMBERS
  EVENTS
}

# Membership status enum
enum MembershipStatus {
  PENDING
  REGULAR
  RESERVE
  CIVIL_SERVICE
  INDUSTRY
  RETIRED
  RESIGNED
  LOST
  DECEASED
}

# Ticket type audience: member-priced line vs guest-priced line (booking rules enforce line placement).
enum TicketAudience {
  MEMBER
  GUEST
}

enum BookingStatus {
  DRAFT
  SUBMITTED
  CONFIRMED
  CANCELLED
}

enum GuestTicketRequestStatus {
  PENDING
  APPROVED
  REJECTED
}

enum TicketOrderStatus {
  PENDING
  PAID
  FAILED
  REFUNDED
}

enum PaymentWebhookEventOutcome {
  PROCESSED
  IGNORED
  DUPLICATE
  FAILED
}

enum PaymentReconciliationExceptionType {
  MISSING_PAYMENT_INTENT
  REFUND_AMOUNT_MISMATCH
  ACTIVE_DISPUTE
}

enum PaymentReconciliationExceptionStatus {
  OPEN
  RESOLVED
}

enum BookingPaymentAdjustmentStatus {
  NOT_REQUIRED
  PENDING_AUTO_REFUND
  PENDING_AUTO_CHARGE
}

enum NotificationChannel {
  EMAIL
  SMS
  PUSH
}

enum NotificationDeliveryStatus {
  PENDING
  SENT
  FAILED
}

enum NotifyDeliveryReceiptProcessingStatus {
  PENDING
  PROCESSED
  FAILED
}

enum NotifyDeliveryReceiptOutcome {
  APPLIED
  IGNORED_STATUS
  IGNORED_NO_USER
  IGNORED_NO_RECIPIENT
  NO_STATE_CHANGE
}

# User table is keyed by Firebase Auth UID.
# Includes HasAudit fields for tracking creation and update metadata
type User @table {
  # `@default(expr: "auth.uid")` sets it to Firebase Auth UID during insert and upsert.
  id: String!
  firstName: String!
  lastName: String!
  email: String!
  serviceNumber: String!
  membershipStatus: MembershipStatus! @default(value: PENDING)
  requestedMembershipStatus: MembershipStatus
  isRegular: Boolean @default(value: false)
  isReserve: Boolean @default(value: false)
  isCivilServant: Boolean @default(value: false)
  isIndustry: Boolean @default(value: false)
  # Free-text rank/title (e.g. "Wing Commander", "Mr") — the client constrains input to a fixed
  # dropdown, but this stays a plain string so the list can change without a schema migration.
  rank: String
  # Site-wide (not per-section) preference: whether other members can see this user's contact
  # details (currently just email) on section member lists. Enforced server-side in
  # getSectionMembersMerged, not just hidden client-side. See #273.
  shareContactInfo: Boolean @default(value: true)
  stripeCustomerId: String
  emailBounceCount: Int! @default(value: 0)
  emailLastBounceAt: Timestamp
  # Optimistic-concurrency and ordering metadata for GOV.UK Notify callbacks.
  # The version is advanced only by the callback processor, allowing updateMany
  # mutations to compare-and-swap the complete derived delivery state safely.
  emailDeliveryVersion: Int! @default(value: 0)
  emailDeliveryStatus: String
  emailDeliveryStatusUpdatedAt: Timestamp
  emailDeliveryReceiptId: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Section table - represents different sections of the application
type Section @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  type: SectionType!
  description: String
  isOpenForRegistration: Boolean @default(value: false)
  allowedUserGroups: [UUID!]
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# UserGroup - groups of users that can be linked to sections, ticket types, etc.
# Can include both individual users (via UserUserGroup) and membership statuses (automatically includes all users with those statuses)
type UserGroup @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String
  membershipStatuses: [MembershipStatus!]  # Membership statuses that are automatically included in this group
  subscribable: Boolean @default(value: false)  # Whether users can self-subscribe to this user group
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# UserUserGroup - junction table linking users to user groups
# A user can be in multiple user groups
type UserUserGroup @table(key: ["user", "userGroup"]) {
  user: User!
  userGroup: UserGroup!
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Why a user group is linked to a section (developer-defined enum; see admin UI for descriptions).
enum SectionUserGroupPurpose {
  ACCESS
  MEMBER
  BOOKER
  MESSAGE
  MODERATOR
}

# One row per (section, userGroup). A single row may include multiple purposes.
type SectionUserGroupPurposeLink @table(key: ["section", "userGroup"]) {
  section: Section!
  userGroup: UserGroup!
  purposes: [SectionUserGroupPurpose!]
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Per-section announcement opt-out. A row here means the user has opted out of announcements for that section.
type SectionAnnouncementOptOut @table(key: ["user", "section"]) {
  user: User!
  section: Section!
  createdAt: Timestamp! @default(expr: "request.time")
}

# Event - a single calendar event (e.g. symposium) linked to an EVENTS section. Order by startDateTime.
type Event @table {
  id: UUID! @default(expr: "uuidV4()")
  section: Section!
  title: String!
  location: String
  guestOfHonour: String
  startDateTime: Timestamp!
  endDateTime: Timestamp!
  bookingStartDateTime: Timestamp!
  bookingEndDateTime: Timestamp!
  # Max guest headcount allowed without extra moderator approval (null = unset; semantics in booking rules).
  maxGuestsWithoutModeratorApproval: Int
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# TicketType - a bookable ticket type for an event. userGroup defines who can book. Order by sortOrder.
type TicketType @table {
  id: UUID! @default(expr: "uuidV4()")
  event: Event!
  userGroup: UserGroup!
  audience: TicketAudience! @default(value: MEMBER)
  title: String!
  description: String
  price: Float!
  sortOrder: Int! @default(value: 0)
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Booking - one booker per event per purchase flow. Idempotent submits use clientSubmissionKey (unique per event+booker+key).
type Booking @table @unique(fields: ["event", "booker", "clientSubmissionKey"]) {
  id: UUID! @default(expr: "uuidV4()")
  event: Event!
  booker: User!
  revisionGroupId: UUID! @default(expr: "uuidV4()")
  revisionNumber: Int! @default(value: 1)
  supersedesBooking: Booking
  supersededAt: Timestamp
  # Client-generated UUID per submit attempt (callable submitEventBooking); DB enforces uniqueness with event+booker.
  clientSubmissionKey: String
  status: BookingStatus! @default(value: DRAFT)
  # Booker-level preferences captured during booking flow (#49).
  bookerDietaryNote: String
  sitNextToUserIds: [String!]
  accommodationRequested: Boolean! @default(value: false)
  accommodationNote: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# One line per ticket; ticket type audience must match use (member vs guest). Guest identity optional.
type BookingLine @table {
  id: UUID! @default(expr: "uuidV4()")
  booking: Booking!
  ticketType: TicketType!
  guestUser: User
  guestDisplayName: String
  dietaryNote: String
  sortOrder: Int! @default(value: 0)
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Extra guest headcount that needs moderator approval beyond the standard cap (see issue #48).
type GuestTicketRequest @table {
  id: UUID! @default(expr: "uuidV4()")
  booking: Booking!
  status: GuestTicketRequestStatus! @default(value: PENDING)
  requestedGuestCount: Int!
  # Mirrors BookingLine guest fields so moderators see who/what is being requested (nullable on legacy rows).
  guestTicketType: TicketType
  guestDisplayName: String
  dietaryNote: String
  reviewedBy: User
  reviewedAt: Timestamp
  moderatorNote: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Payment order for Stripe Checkout fulfillment and reconciliation.
type TicketOrder @table @unique(fields: ["stripeCheckoutSessionId"]) {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  event: Event!
  ticketType: TicketType!
  quantity: Int! @default(value: 1)
  unitAmountMinor: Int!
  totalAmountMinor: Int!
  currency: String! @default(value: "gbp")
  status: TicketOrderStatus! @default(value: PENDING)
  stripeCheckoutSessionId: String
  stripePaymentIntentId: String
  stripeRefundId: String
  refundedAmountMinor: Int
  refundedAt: Timestamp
  stripeDisputeId: String
  disputeStatus: String
  disputeReason: String
  disputeAmountMinor: Int
  disputeOpenedAt: Timestamp
  disputeUpdatedAt: Timestamp
  disputeClosedAt: Timestamp
  webhookEventId: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Immutable ledger of Stripe webhook events for idempotency and reconciliation audit.
type PaymentWebhookEvent @table @unique(fields: ["stripeEventId"]) {
  id: UUID! @default(expr: "uuidV4()")
  stripeEventId: String!
  eventType: String!
  outcome: PaymentWebhookEventOutcome!
  reason: String
  # Linked order when event metadata includes orderId and lookup succeeds.
  ticketOrder: TicketOrder
  # Lightweight payload metadata for diagnostics (not full raw payload storage).
  stripeObjectId: String
  livemode: Boolean!
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

type PaymentReconciliationException @table {
  id: UUID! @default(expr: "uuidV4()")
  ticketOrder: TicketOrder!
  exceptionType: PaymentReconciliationExceptionType!
  status: PaymentReconciliationExceptionStatus! @default(value: OPEN)
  note: String
  ownerUserId: String
  lastAttemptedAt: Timestamp
  resolvedAt: Timestamp
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Generic delivery ledger for notification idempotency across channels/providers.
type NotificationDelivery @table @unique(fields: ["channel", "deliveryKey"]) {
  id: UUID! @default(expr: "uuidV4()")
  channel: NotificationChannel!
  notificationType: String!
  deliveryKey: String!
  status: NotificationDeliveryStatus! @default(value: PENDING)
  ticketOrder: TicketOrder
  booking: Booking
  user: User
  provider: String
  providerMessageId: String
  attemptCount: Int! @default(value: 1)
  lastAttemptedAt: Timestamp
  sentAt: Timestamp
  lastErrorCode: String
  lastErrorMessage: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Announcement send summary — one per bulk send triggered by a moderator.
type AnnouncementSend @table {
  id: UUID! @default(expr: "uuidV4()")
  section: Section!
  templateUuid: String!
  templateName: String
  sentBy: String!
  sentAt: Timestamp! @default(expr: "request.time")
  recipientCount: Int!
  skippedCount: Int!
  failureCount: Int!
}

# Per-recipient audit row for a bulk announcement send.
type AnnouncementRecipient @table {
  id: UUID! @default(expr: "uuidV4()")
  announcementSend: AnnouncementSend!
  userId: String!
  email: String!
  firstName: String!
  lastName: String!
  status: String!
  skippedReason: String
  sentAt: Timestamp
  failureReason: String
  # Latest GOV.UK Notify receipt applied to this recipient. The version supports
  # compare-and-swap updates when callbacks arrive concurrently or out of order.
  deliveryVersion: Int! @default(value: 0)
  deliveryStatusUpdatedAt: Timestamp
  deliveryReceiptId: String
}

# Durable receipt ledger for GOV.UK Notify callbacks. The provider receipt ID is
# the primary key, which makes callback insertion idempotent. Processing leases
# allow an abandoned PENDING receipt to be reclaimed safely.
type NotifyDeliveryReceipt @table {
  id: String!
  notifyStatus: String!
  reference: String
  recipientHash: String!
  user: User
  eventAt: Timestamp!
  # ISO timestamp followed by receipt ID; provides deterministic total ordering
  # even if two provider events have the same timestamp.
  eventOrderingKey: String!
  affectsBounceState: Boolean!
  processingStatus: NotifyDeliveryReceiptProcessingStatus! @default(value: PENDING)
  outcome: NotifyDeliveryReceiptOutcome
  attemptCount: Int! @default(value: 1)
  lastAttemptedAt: Timestamp!
  processedAt: Timestamp
  lastErrorMessage: String
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

type BookingPaymentAdjustment @table(key: ["revisionBooking", "supersededBooking"]) {
  id: UUID! @default(expr: "uuidV4()")
  revisionBooking: Booking!
  supersededBooking: Booking!
  deltaAmountMinor: Int!
  status: BookingPaymentAdjustmentStatus!
  orchestrationKey: String!
  # HasAudit fields
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
  createdBy: String @default(expr: "auth.uid")
  updatedBy: String @default(expr: "auth.uid")
}

# Per-user fixed-window rate-limit counter for high-risk callable functions (see #344,
# functions/src/rateLimiter.ts). SDK-only — never exposed to the client. One row per
# (userId, functionName) pair, overwritten every window rather than accumulating a row
# per window, so the table stays bounded by (active users) x (rate-limited functions)
# with no cleanup job needed.
type CallableInvocation @table(key: ["userId", "functionName"]) {
  userId: String!
  functionName: String!
  windowStart: Timestamp!
  count: Int!
}
